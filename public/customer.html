<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <title>RoomAid - Guest Portal</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="RoomAidTaskBoard.png">
    <style>
        /* ===== Guest Portal Specific Styles ===== */
        .customer-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 16px;
        }

        .customer-header {
            background: linear-gradient(135deg, var(--brand-primary) 0%, var(--bg-tertiary) 100%);
            color: var(--text-accent);
            padding: 20px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 4px 12px var(--shadow-primary);
        }

        .customer-header-left h1 {
            font-size: 1.5rem;
            margin: 0 0 4px 0;
        }

        .customer-header-left p {
            margin: 0;
            opacity: 0.85;
            font-size: 0.95rem;
        }

        .room-badge {
            background: rgba(255,255,255,0.25);
            border: 2px solid rgba(255,255,255,0.4);
            color: #fff;
            font-size: 1.6rem;
            font-weight: 700;
            padding: 8px 20px;
            border-radius: 10px;
            letter-spacing: 1px;
        }

        .customer-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .request-btn {
            flex: 1;
            min-width: 160px;
            background: var(--brand-primary);
            color: var(--text-accent);
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 8px var(--shadow-primary);
            transition: all 0.2s;
        }

        .request-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 14px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .orders-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .order-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 6px var(--shadow-primary);
            position: relative;
        }

        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
        }

        .order-card-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .order-card-dept {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border-primary);
            white-space: nowrap;
        }

        .order-card-notes {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .order-card-meta {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-open    { background: #fef3c7; color: #92400e; }
        .status-received { background: #dbeafe; color: #1e40af; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-on-hold { background: #fee2e2; color: #991b1b; }

        [data-theme="dark"] .status-open     { background: #451a03; color: #fcd34d; }
        [data-theme="dark"] .status-received  { background: #1e3a5f; color: #93c5fd; }
        [data-theme="dark"] .status-completed { background: #064e3b; color: #6ee7b7; }
        [data-theme="dark"] .status-on-hold  { background: #7f1d1d; color: #fca5a5; }

        .cancel-order-btn {
            background: none;
            border: 1px solid var(--brand-danger, #ef4444);
            color: var(--brand-danger, #ef4444);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: auto;
        }

        .cancel-order-btn:hover {
            background: var(--brand-danger, #ef4444);
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-secondary);
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        /* Theme toggle button */
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: 0 2px 8px var(--shadow-primary);
            z-index: 100;
        }

        /* Modal overrides for customer */
        .customer-modal .modal-content {
            max-width: 480px;
        }

        .dept-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 12px 0;
        }

        .dept-option {
            border: 2px solid var(--border-primary);
            background: var(--bg-tertiary);
            border-radius: 10px;
            padding: 14px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .dept-option:hover, .dept-option.selected {
            border-color: var(--brand-primary);
            background: var(--brand-primary);
            color: var(--text-accent);
        }

        .dept-option .dept-icon {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 4px;
        }

        .logout-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .refresh-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: var(--bg-tertiary);
        }
    </style>
</head>
<body>
    <div class="customer-container" id="customerApp"></div>
    <button id="themeToggle" class="theme-toggle" title="Toggle theme">🌙</button>

    <!-- New Request Modal -->
    <div id="requestModal" class="modal" style="display:none;">
        <div class="modal-content customer-modal">
            <div class="modal-header">
                <h2>🛎️ Request a Service</h2>
                <button id="closeRequestModal" class="close-btn">&times;</button>
            </div>
            <form id="requestForm">
                <div class="form-group">
                    <label>Select Department</label>
                    <div class="dept-grid" id="deptGrid">
                        <div class="dept-option" data-dept="Engineering">
                            <span class="dept-icon">🔧</span>Engineering
                        </div>
                        <div class="dept-option" data-dept="Housekeeping">
                            <span class="dept-icon">🧹</span>Housekeeping
                        </div>
                        <div class="dept-option" data-dept="Laundry">
                            <span class="dept-icon">👔</span>Laundry
                        </div>
                        <div class="dept-option" data-dept="Room Service">
                            <span class="dept-icon">🍽️</span>Room Service
                        </div>
                    </div>
                    <input type="hidden" id="selectedDept" value="">
                </div>
                <div class="form-group">
                    <label for="requestNotes">Notes (optional)</label>
                    <textarea id="requestNotes" rows="3" placeholder="Describe your request..." style="resize:vertical;"></textarea>
                </div>
                <div id="requestError" class="error-message" style="display:none;"></div>
                <div class="modal-actions">
                    <button type="button" id="cancelRequestBtn" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submitRequestBtn">Send Request</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Cancel Confirmation Modal -->
    <div id="cancelModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>❌ Cancel Order</h2>
                <button id="closeCancelModal" class="close-btn">&times;</button>
            </div>
            <div style="padding: 0 0 16px 0;">
                <p style="color:var(--text-secondary); margin-bottom:12px;">Please tell us why you're cancelling this request.</p>
                <div class="form-group">
                    <label for="cancelReasonInput">Reason <span style="color:var(--brand-danger,#ef4444)">*</span></label>
                    <textarea id="cancelReasonInput" rows="3" placeholder="e.g. No longer needed, Already resolved..." style="resize:vertical;"></textarea>
                    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;">
                        <button type="button" class="quick-suggestion-btn" data-cancel-reason="No longer needed">No longer needed</button>
                        <button type="button" class="quick-suggestion-btn" data-cancel-reason="Already resolved">Already resolved</button>
                        <button type="button" class="quick-suggestion-btn" data-cancel-reason="Wrong department">Wrong department</button>
                    </div>
                </div>
                <div id="cancelReasonError" class="error-message" style="display:none;"></div>
            </div>
            <div class="modal-actions">
                <button id="keepOrderBtn" class="btn btn-secondary">Keep Order</button>
                <button id="confirmCancelBtn" class="btn btn-danger">Cancel Order</button>
            </div>
        </div>
    </div>

    <script src="customer.js"></script>
</body>
</html>
