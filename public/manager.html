<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f5f5f5">
    <title>RoomAid - Manager Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: var(--bg-primary);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .manager-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .manager-header {
            background: linear-gradient(135deg, var(--brand-primary) 0%, var(--bg-tertiary) 100%);
            color: var(--text-accent);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 6px var(--shadow-primary);
        }

        .manager-nav {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .nav-btn {
            padding: 12px 24px;
            background: var(--brand-primary);
            color: var(--text-accent);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 2px 4px var(--shadow-primary);
        }

        .nav-btn:hover {
            background: var(--bg-tertiary);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px var(--shadow-primary);
        }

        .nav-btn.active {
            background: var(--brand-secondary);
            box-shadow: 0 4px 8px var(--shadow-primary);
        }

        .manager-section {
            display: none;
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 12px var(--shadow-primary);
            border: 1px solid var(--border-primary);
            transition: all 0.3s ease;
        }

        .manager-section.active {
            display: block;
        }

        .card {
            background: var(--bg-tertiary);
            padding: 1.5rem;
            border-radius: 10px;
            border: 1px solid var(--border-primary);
            box-shadow: 0 2px 4px var(--shadow-primary);
        }

        .table-wrapper {
            overflow-x: auto;
            margin-top: 20px;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
        }

        .users-table th, .users-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-primary);
        }

        .users-table th {
            background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--brand-primary) 100%);
            color: var(--text-accent);
            font-weight: 600;
            font-size: 14px;
        }

        .users-table tr:hover {
            background-color: var(--bg-secondary);
            transition: all 0.2s;
        }

        .pill {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            background: var(--bg-secondary);
            color: var(--text-tertiary);
            border: 1px solid var(--border-primary);
        }

        .flex-between {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-input {
            width: 100%;
            max-width: 320px;
            padding: 10px 12px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .placeholder-card {
            background: var(--bg-tertiary);
            border: 1px dashed var(--border-primary);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: var(--text-secondary);
        }

        .settings-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 12px;
        }

        .settings-btn {
            padding: 10px 14px;
            border: 1px solid var(--border-primary);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .settings-btn:hover {
            background: var(--bg-tertiary);
        }
    </style>
</head>
<body>
    <div id="manager-root" class="manager-container"></div>
    <button id="themeToggle" class="theme-toggle" title="Toggle theme">🌙</button>
    <script src="manager.js"></script>
</body>
</html>
